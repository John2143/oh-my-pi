name: Sync from upstream

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: john

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote and fetch
        run: |
          git remote add upstream https://github.com/can1357/oh-my-pi.git
          git fetch upstream main

      - name: Fast-forward main from upstream
        run: |
          git checkout -B main origin/main
          git merge --ff-only upstream/main
          git push origin main

      - name: Rebase john onto upstream/main
        id: rebase
        run: |
          git checkout john
          if git rebase upstream/main; then
            git push --force-with-lease origin john
            echo "result=clean" >> "$GITHUB_OUTPUT"
          else
            CONFLICTS=$(git diff --name-only --diff-filter=U | tr '\n' ' ')
            git rebase --abort
            echo "result=conflict" >> "$GITHUB_OUTPUT"
            {
              echo "conflicts<<EOF"
              echo "$CONFLICTS"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            echo "upstream_sha=$(git rev-parse upstream/main)" >> "$GITHUB_OUTPUT"
          fi

      - name: Open or refresh conflict issue
        if: steps.rebase.outputs.result == 'conflict'
        uses: actions/github-script@v8
        env:
          CONFLICTS: ${{ steps.rebase.outputs.conflicts }}
          UPSTREAM_SHA: ${{ steps.rebase.outputs.upstream_sha }}
        with:
          script: |
            const title = "Upstream sync conflict — manual rebase needed";
            const body = [
              `Daily sync failed to rebase \`john\` onto \`upstream/main\` at \`${process.env.UPSTREAM_SHA}\`.`,
              ``,
              `Conflicting paths:`,
              ``,
              "```",
              (process.env.CONFLICTS || "").trim() || "(none reported)",
              "```",
              ``,
              `Run locally:`,
              "```sh",
              `git fetch upstream && git checkout john && git rebase upstream/main`,
              "```",
            ].join("\n");
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "upstream-sync",
            });
            const existing = issues.find(i => i.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ["upstream-sync"],
              });
            }
